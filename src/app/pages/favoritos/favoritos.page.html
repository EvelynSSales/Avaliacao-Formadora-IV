<ion-header>
  <ion-toolbar>
    <ion-title>Favoritos</ion-title>

    <ion-buttons slot="start">
      <ion-button routerLink="/home">
        Voltar
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <p *ngIf="favoritos.length === 0">
    Nenhum pokémon favorito ainda.
  </p>

  <div class="card" *ngFor="let favorito of favoritos">
    <img [src]="favorito.imagem" [alt]="favorito.nome" />

    <div class="info">
      <h2>{{ favorito.nome | titlecase }}</h2>
      <p>Tipo: {{ favorito.tipo | titlecase }}</p>

      <ion-item>
        <ion-label position="stacked">
          Observação
        </ion-label>

        <ion-input [(ngModel)]="favorito.observacao"></ion-input>
      </ion-item>

      <ion-button expand="block" (click)="atualizar(favorito)">
        Atualizar
      </ion-button>

      <ion-button expand="block" color="danger" (click)="remover(favorito)">
        Remover
      </ion-button>
    </div>
  </div>
</ion-content>
